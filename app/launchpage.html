<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Samanvay</title>
    <link rel="icon" type="image/png" href="./logo.png" />
    <!-- PWA -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#354a5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Samanvay" />
    <link rel="apple-touch-icon" href="./logo.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-resourceroots='{"com.samanvay.shell":"./shell"}'
        data-sap-ui-onInit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-frameOptions="allow">
    </script>
</head>
<body class="sapUiBody" id="content">
    <div data-sap-ui-component
         data-name="com.samanvay.shell"
         data-id="shellContainer"
         data-settings='{"id":"shell"}'
         class="sapUiFullHeight">
    </div>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      }
      // Vercel analytics — only load when deployed on Vercel
      if (location.hostname !== 'localhost') {
        var s1 = document.createElement('script');
        s1.defer = true; s1.src = '/_vercel/insights/script.js';
        document.body.appendChild(s1);
        var s2 = document.createElement('script');
        s2.defer = true; s2.src = 'https://va.vercel-scripts.com/v1/speed-insights/script.debug.js';
        document.body.appendChild(s2);
      }
    </script>
</body>
</html>
