<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            #shell-header-icon {
                content: url('./logo.png') !important;
                width: 2rem !important;
                height: 2.5rem !important;
            }
            .sapUshellShellHeadItm .sapUiIcon::before {
                content: '' !important;
            }
        </style>
        <script>
            window['sap-ushell-config'] = {
                defaultRenderer: 'fiori2',
                services: {
                    NavTargetResolution: {
                        config: {
                            allowTestUrlComponentConfig: true,
                            enableClientSideTargetResolution: true
                        }
                    }           
                },
                applications: {
                    "admin-members": {
                        title: 'Members Management',
                        description: 'Manage mandal members',
                        additionalInformation: 'SAPUI5.Component=com.samanvay.admin.members',
                        applicationType: 'URL',
                        url: "./admin/members/webapp",
                        navigationMode: 'embedded'
                    },
                    "admin-events": {
                        title: 'Events & Attendance',
                        description: 'Manage events and track attendance',
                        additionalInformation: 'SAPUI5.Component=com.samanvay.admin.eventsandattendance',
                        applicationType: 'URL',
                        url: "./admin/eventsandattendance/webapp",
                        navigationMode: 'embedded'
                    },
                    "admin-fines": {
                        title: 'Fines Management',
                        description: 'Manage member fines and payments',
                        additionalInformation: 'SAPUI5.Component=com.samanvay.admin.fines',
                        applicationType: 'URL',
                        url: "./admin/fines/webapp",
                        navigationMode: 'embedded'
                    },
                    "admin-ledger": {
                        title: 'Financial Ledger',
                        description: 'View mandal financial records',
                        additionalInformation: 'SAPUI5.Component=com.samanvay.admin.ledger',
                        applicationType: 'URL',
                        url: "./admin/ledger/webapp",
                        navigationMode: 'embedded'
                    },
                    "admin-courses": {
                        title: 'Courses',
                        description: 'Manage courses and syllabus',
                        additionalInformation: 'SAPUI5.Component=com.samanvay.admin.courses',
                        applicationType: 'URL',
                        url: "./admin/courses/webapp",
                        navigationMode: 'embedded'
                    },
                    "admin-joinrequests": {
                        title: 'Membership Requests',
                        description: 'Review and approve join requests',
                        additionalInformation: 'SAPUI5.Component=com.samanvay.admin.joinrequests',
                        applicationType: 'URL',
                        url: "./admin/joinrequests/webapp",
                        navigationMode: 'embedded'
                    },
                    "admin-positions": {
                        title: 'Mandal Positions',
                        description: 'Manage positions and assignments',
                        additionalInformation: 'SAPUI5.Component=com.samanvay.admin.positions',
                        applicationType: 'URL',
                        url: "./admin/positions/webapp",
                        navigationMode: 'embedded'
                    },
                    "admin-mandal": {
                        title: 'Mandal Settings',
                        description: 'Manage mandal configuration',
                        additionalInformation: 'SAPUI5.Component=com.samanvay.admin.mandal',
                        applicationType: 'URL',
                        url: "./admin/mandal/webapp",
                        navigationMode: 'embedded'
                    }
            }
        }
        </script>
        <script src="https://ui5.sap.com/test-resources/sap/ushell/bootstrap/sandbox.js"></script>
        <script
            src="https://ui5.sap.com/resources/sap-ui-core.js"
            data-sap-ui-libs="sap.m, sap.ushell, sap.fe.templates"
            data-sap-ui-compatVersion="edge"
            data-sap-ui-theme="sap_horizon"
            data-sap-ui-frameOptions="allow"
            data-sap-ui-bindingSyntax="complex"
        ></script>
        <script>
            sap.ui.getCore().attachInit(function() {
                sap.ushell.Container.createRenderer().placeAt('content');
            });
        </script>
    </head>
    <body class="sapUiBody" id="content"></body>
</html>
